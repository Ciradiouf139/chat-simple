<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Simple - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .chat-bubble {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Animated background elements -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="chat-bubble absolute top-20 left-20 w-20 h-20 bg-white/10 rounded-full"></div>
        <div class="chat-bubble absolute top-40 right-32 w-16 h-16 bg-white/10 rounded-full" style="animation-delay: 1s;"></div>
        <div class="chat-bubble absolute bottom-20 left-40 w-12 h-12 bg-white/10 rounded-full" style="animation-delay: 2s;"></div>
        <div class="chat-bubble absolute bottom-40 right-20 w-24 h-24 bg-white/10 rounded-full" style="animation-delay: 0.5s;"></div>
    </div>

    <!-- Main container -->
    <div class="glass-effect p-8 rounded-2xl shadow-2xl w-full max-w-md relative z-10 transform hover:scale-105 transition-transform duration-300">
        <!-- Icon and title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full mb-4 shadow-lg">
                <i class="fas fa-comments text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                Chat Simple
            </h1>
            <p class="text-gray-600 mt-2">Rejoignez la conversation</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-lg mb-6 animate-pulse">
            <div class="flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                {{ error }}
            </div>
        </div>
        {% endif %}
        
        <form method="POST" action="/login" class="space-y-6">
            <div class="relative">
                <label for="username" class="block text-gray-700 text-sm font-semibold mb-2">
                    <i class="fas fa-user mr-2 text-blue-500"></i>Nom d'utilisateur
                </label>
                <div class="relative">
                    <input type="text" 
                           id="username" 
                           name="username" 
                           required
                           minlength="2"
                           maxlength="20"
                           class="w-full px-4 py-3 pl-12 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 input-glow transition-all duration-300"
                           placeholder="Choisissez un pseudo">
                    <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold py-3 px-4 rounded-xl hover:from-blue-600 hover:to-purple-700 transition-all duration-300 transform hover:scale-105 shadow-lg flex items-center justify-center space-x-2">
                <i class="fas fa-sign-in-alt"></i>
                <span>Rejoindre le chat</span>
            </button>
        </form>
        
        <!-- Footer info -->
        <div class="mt-8 text-center">
            <div class="flex items-center justify-center space-x-4 text-gray-500 text-sm">
                <div class="flex items-center">
                    <i class="fas fa-shield-alt mr-1 text-green-500"></i>
                    <span>Sécurisé</span>
                </div>
                <div class="flex items-center">
                    <i class="fas fa-bolt mr-1 text-yellow-500"></i>
                    <span>Rapide</span>
                </div>
                <div class="flex items-center">
                    <i class="fas fa-heart mr-1 text-red-500"></i>
                    <span>Simple</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
