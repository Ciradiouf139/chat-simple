<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Simple - Version Avancée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        
        .gradient-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message-bubble {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .online-indicator {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 0;
            right: 0;
        }
        
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            background: #e5e7eb;
            border-radius: 18px;
        }
        
        .typing-indicator span {
            height: 8px;
            width: 8px;
            background: #6b7280;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        .reaction-button {
            transition: all 0.2s;
        }
        
        .reaction-button:hover {
            transform: scale(1.2);
        }
        
        .room-tab {
            transition: all 0.3s;
        }
        
        .room-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .stats-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
    <header class="gradient-header text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-comments text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">Chat Simple v2.0</h1>
                    <p class="text-xs opacity-90">WebSocket • API REST • Monitoring</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2">
                    <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                    <span class="text-sm">{{ session.username }}</span>
                </div>
                <a href="/logout" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm transition-colors">
                    <i class="fas fa-sign-out-alt mr-2"></i>
                    <span>Déconnexion</span>
                </a>
            </div>
        </div>
    </header>

    <main class="flex-1 container mx-auto p-4 flex gap-4 h-full">
        <!-- Sidebar gauche - Salons et Stats -->
        <div class="w-80 space-y-4">
            <!-- Salons -->
            <div class="bg-white rounded-xl shadow-md p-4">
                <h2 class="font-bold text-lg mb-4 flex items-center space-x-2">
                    <i class="fas fa-door-open text-blue-500 mr-2"></i>
                    <span>Salons</span>
                </h2>
                <div id="roomsList" class="space-y-2">
                    <!-- Les salons seront chargés via JavaScript -->
                </div>
                <button onclick="showCreateRoomModal()" class="mt-4 w-full bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition-colors">
                    <i class="fas fa-plus mr-2"></i>
                    <span>Créer un salon</span>
                </button>
            </div>
            
            <!-- Statistiques -->
            <div class="stats-card text-white rounded-xl shadow-md p-4">
                <h2 class="font-bold text-lg mb-4 flex items-center space-x-2">
                    <i class="fas fa-chart-line mr-2"></i>
                    <span>Statistiques Live</span>
                </h2>
                <div class="space-y-3">
                    <div class="flex justify-between">
                        <span>Messages/sec</span>
                        <span id="messagesPerSec" class="font-bold">0</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Utilisateurs en ligne</span>
                        <span id="onlineUsers" class="font-bold">0</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Total messages</span>
                        <span id="totalMessages" class="font-bold">0</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Latence (ms)</span>
                        <span id="latency" class="font-bold">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Zone de chat principale -->
        <div class="flex-1 flex flex-col">
            <!-- Onglets des salons -->
            <div class="bg-white rounded-t-xl shadow-md p-4">
                <div id="roomTabs" class="flex space-x-2 overflow-x-auto">
                    <!-- Les onglets des salons seront ajoutés dynamiquement -->
                </div>
            </div>
            
            <!-- Messages Container -->
            <div class="flex-1 bg-white rounded-b-xl shadow-md p-6 flex flex-col">
                <div class="flex-1 overflow-y-auto mb-4 space-y-4" id="messages">
                    <!-- Les messages seront chargés via JavaScript -->
                </div>
                
                <!-- Zone de saisie -->
                <div class="border-t pt-4">
                    <div id="typingIndicator" class="typing-indicator mb-3 hidden">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span class="ml-2 text-sm">Quelqu'un écrit...</span>
                    </div>
                    
                    <form id="messageForm" class="flex gap-3">
                        <div class="flex-1 relative">
                            <input type="text" 
                                   id="messageInput" 
                                   placeholder="Tapez votre message..." 
                                   class="w-full px-4 py-3 pr-12 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all duration-300"
                                   maxlength="500">
                            <button type="button" onclick="showEmojiPicker()" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                                <i class="fas fa-smile"></i>
                            </button>
                        </div>
                        <button type="submit" 
                                class="bg-gradient-to-r from-blue-500 to-purple-600 text-white px-6 py-3 rounded-xl hover:from-blue-600 hover:to-purple-700 transition-all duration-300 transform hover:scale-105 shadow-lg flex items-center space-x-2">
                            <i class="fas fa-paper-plane"></i>
                            <span>Envoyer</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Sidebar droite - Utilisateurs -->
        <div class="w-80 bg-white rounded-xl shadow-md p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-bold text-lg flex items-center space-x-2">
                    <i class="fas fa-users text-blue-500 mr-2"></i>
                    <span>Utilisateurs en ligne</span>
                </h2>
                <span class="bg-green-100 text-green-600 px-2 py-1 rounded-full text-xs font-semibold" id="userCount">
                    0
                </span>
            </div>
            
            <div id="usersList" class="space-y-3">
                <!-- Les utilisateurs seront chargés via JavaScript -->
            </div>
        </div>
    </main>

    <!-- Modal pour créer un salon -->
    <div id="createRoomModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-96">
            <h3 class="text-lg font-bold mb-4">Créer un nouveau salon</h3>
            <form id="createRoomForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Nom du salon</label>
                    <input type="text" id="roomName" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Description</label>
                    <textarea id="roomDescription" rows="3" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500"></textarea>
                </div>
                <div class="flex space-x-3">
                    <button type="submit" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition-colors">
                        Créer
                    </button>
                    <button type="button" onclick="hideCreateRoomModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-700 px-4 py-2 rounded-lg transition-colors">
                        Annuler
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuration
        const socket = io();
        let currentRoom = 'general';
        let lastMessageId = 0;
        
        // Connexion WebSocket
        socket.on('connect', function() {
            console.log('Connecté au WebSocket');
            socket.emit('join_room', {room: currentRoom});
        });
        
        // Événements WebSocket
        socket.on('new_message', function(data) {
            if (data.room === currentRoom) {
                addMessageToChat(data);
                updateStats();
            }
        });
        
        socket.on('user_joined', function(data) {
            showNotification(`${data.username} a rejoint le salon`, 'success');
            loadUsers();
        });
        
        socket.on('user_left', function(data) {
            showNotification(`${data.username} a quitté le salon`, 'info');
            loadUsers();
        });
        
        socket.on('user_typing', function(data) {
            if (data.room === currentRoom) {
                showTypingIndicator(data.username);
            }
        });
        
        // Fonctions principales
        async function loadRooms() {
            try {
                const response = await fetch('/api/rooms');
                const rooms = await response.json();
                
                const roomsList = document.getElementById('roomsList');
                const roomTabs = document.getElementById('roomTabs');
                
                roomsList.innerHTML = '';
                roomTabs.innerHTML = '';
                
                rooms.forEach(room => {
                    // Ajouter à la sidebar
                    const roomDiv = document.createElement('div');
                    roomDiv.className = `room-tab p-3 rounded-lg cursor-pointer hover:bg-gray-100 ${room.name === currentRoom ? 'active' : ''}`;
                    roomDiv.innerHTML = `
                        <div class="font-semibold">${room.name}</div>
                        <div class="text-xs text-gray-500">${room.description || 'Aucune description'}</div>
                    `;
                    roomDiv.onclick = () => joinRoom(room.name);
                    roomsList.appendChild(roomDiv);
                    
                    // Ajouter les onglets
                    const tab = document.createElement('button');
                    tab.className = `room-tab px-4 py-2 rounded-lg ${room.name === currentRoom ? 'active' : ''}`;
                    tab.textContent = room.name;
                    tab.onclick = () => joinRoom(room.name);
                    roomTabs.appendChild(tab);
                });
            } catch (error) {
                console.error('Erreur lors du chargement des salons:', error);
            }
        }
        
        async function joinRoom(roomName) {
            currentRoom = roomName;
            socket.emit('join_room', {room: roomName});
            loadMessages();
            loadRooms();
        }
        
        async function loadMessages() {
            try {
                const response = await fetch(`/api/messages?room=${currentRoom}`);
                const messages = await response.json();
                
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = '';
                
                messages.forEach(msg => {
                    addMessageToChat(msg);
                });
                
                lastMessageId = messages.length > 0 ? Math.max(...messages.map(m => m.id)) : 0;
            } catch (error) {
                console.error('Erreur lors du chargement des messages:', error);
            }
        }
        
        function addMessageToChat(message) {
            const messagesDiv = document.getElementById('messages');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-bubble flex items-start space-x-3';
            messageDiv.innerHTML = `
                <div class="flex-shrink-0 relative">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center user-avatar text-white font-semibold">
                        ${message.username[0].toUpperCase()}
                    </div>
                    <div class="online-indicator"></div>
                </div>
                <div class="flex-1">
                    <div class="flex items-center space-x-2 mb-1">
                        <span class="font-semibold text-sm" style="color: #667eea">
                            ${message.username}
                        </span>
                        <span class="text-xs text-gray-500">${new Date(message.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div class="bg-gray-100 rounded-2xl rounded-tl-none p-3 inline-block max-w-md">
                        <p class="text-gray-800">${message.message}</p>
                        <div class="flex space-x-2 mt-2">
                            <button onclick="addReaction(${message.id}, '👍')" class="reaction-button text-sm">👍</button>
                            <button onclick="addReaction(${message.id}, '❤️')" class="reaction-button text-sm">❤️</button>
                            <button onclick="addReaction(${message.id}, '😂')" class="reaction-button text-sm">😂</button>
                        </div>
                    </div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                
                const usersList = document.getElementById('usersList');
                const userCount = document.getElementById('userCount');
                
                usersList.innerHTML = '';
                const onlineUsers = users.filter(u => u.is_online);
                userCount.textContent = onlineUsers.length;
                
                onlineUsers.forEach(user => {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'flex items-center space-x-3 p-3 rounded-xl hover:bg-gray-50 transition-all duration-200 cursor-pointer';
                    userDiv.innerHTML = `
                        <div class="relative">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-semibold" style="background-color: ${user.color}">
                                ${user.username[0].toUpperCase()}
                            </div>
                            <div class="online-indicator"></div>
                        </div>
                        <div class="flex-1">
                            <div class="font-semibold text-gray-800">${user.username}</div>
                            <div class="text-xs text-green-500 flex items-center space-x-1">
                                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                                <span>En ligne</span>
                            </div>
                        </div>
                    `;
                    usersList.appendChild(userDiv);
                });
            } catch (error) {
                console.error('Erreur lors du chargement des utilisateurs:', error);
            }
        }
        
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('messagesPerSec').textContent = '2.5'; // Simulé
                document.getElementById('onlineUsers').textContent = stats.online_users;
                document.getElementById('totalMessages').textContent = stats.total_messages;
                document.getElementById('latency').textContent = '45'; // Simulé
            } catch (error) {
                console.error('Erreur lors du chargement des statistiques:', error);
            }
        }
        
        // Formulaire de message
        document.getElementById('messageForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            try {
                const response = await fetch('/api/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message, room: currentRoom })
                });
                
                if (response.ok) {
                    input.value = '';
                    // Le message sera ajouté automatiquement via WebSocket
                } else {
                    const error = await response.json();
                    alert('Erreur: ' + error.error);
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors de l\'envoi du message');
            }
        });
        
        // Indicateur de frappe
        let typingTimeout;
        document.getElementById('messageInput').addEventListener('input', function() {
            socket.emit('typing', {room: currentRoom});
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stop_typing', {room: currentRoom});
            }, 1000);
        });
        
        function showTypingIndicator(username) {
            const indicator = document.getElementById('typingIndicator');
            indicator.classList.remove('hidden');
            indicator.querySelector('span:last-child').textContent = `${username} écrit...`;
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                indicator.classList.add('hidden');
            }, 3000);
        }
        
        // Modal pour créer un salon
        function showCreateRoomModal() {
            document.getElementById('createRoomModal').classList.remove('hidden');
        }
        
        function hideCreateRoomModal() {
            document.getElementById('createRoomModal').classList.add('hidden');
            document.getElementById('createRoomForm').reset();
        }
        
        document.getElementById('createRoomForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('roomName').value;
            const description = document.getElementById('roomDescription').value;
            
            try {
                const response = await fetch('/api/rooms', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, description })
                });
                
                if (response.ok) {
                    hideCreateRoomModal();
                    loadRooms();
                    showNotification('Salon créé avec succès!', 'success');
                } else {
                    const error = await response.json();
                    alert('Erreur: ' + error.error);
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors de la création du salon');
            }
        });
        
        // Réactions
        async function addReaction(messageId, reaction) {
            try {
                const response = await fetch('/api/reactions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message_id: messageId, reaction })
                });
                
                if (response.ok) {
                    showNotification('Réaction ajoutée!', 'success');
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        }
        
        // Notifications
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 px-4 py-2 rounded-lg text-white z-50 ${
                type === 'success' ? 'bg-green-500' : 
                type === 'error' ? 'bg-red-500' : 'bg-blue-500'
            }`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            loadRooms();
            loadUsers();
            loadMessages();
            updateStats();
            
            // Rafraîchir les stats toutes les 5 secondes
            setInterval(updateStats, 5000);
            
            // Focus sur l'input
            document.getElementById('messageInput').focus();
            
            // Support des touches
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    document.getElementById('messageForm').dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
